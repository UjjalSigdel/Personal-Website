# CI guardrails (FOUNDATION.md M10): every branch must type-check, pass the
# mechanical foundation checks, and produce a production build. Deliberately
# lightweight — no lint stack, no test runner (none are configured).
name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run check:foundation
      - run: npm run build
